<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#5a67d8">
    <title>成长轨迹</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌱%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div id="lock-screen" class="lock-screen">
        <div class="lock-logo">🌱</div>
        <div class="lock-title">成长轨迹</div>
        <div class="lock-sub">请输入访问密码</div>
        <input class="lock-input" id="lock-pwd" type="password" placeholder="密码" autocomplete="off" onkeydown="if(event.key==='Enter')App.unlock()">
        <button class="lock-btn" onclick="App.unlock()">进入</button>
        <div class="lock-error" id="lock-error"></div>
        <div class="lock-setup-hint" id="lock-hint"></div>
    </div>
    <div id="app" style="display:none">
        <header id="header">
            <button class="hdr-btn hidden" id="btn-back" onclick="App.goBack()">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h1 id="page-title">成长轨迹</h1>
            <div style="display:flex;align-items:center;flex-shrink:0">
                <button class="hdr-btn" id="btn-theme" onclick="App.toggleTheme()" title="切换主题">
                    <svg id="icon-theme" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button class="hdr-btn hidden" id="btn-hist" onclick="App.showCurrentHistory()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </button>
            </div>
        </header>
        <main id="main"></main>
    </div>
    <div id="modal-mask" onclick="Modal.onMaskClick(event)">
        <div class="modal-dialog" onclick="event.stopPropagation()">
            <div id="modal-inner"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
